<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/edit_product.css') }}">
</head>

<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shopping-basket"></i>
            <h4>Grocery Store Admin</h4>
        </div>
        <div class="sidebar-menu">
            <a href="{{ url_for('admin.dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="{{ url_for('admin.manage_products') }}" class="active"><i class="fas fa-box"></i> Products</a>
            <a href="{{ url_for('admin.add_product') }}"><i class="fas fa-plus-circle"></i> Add Product</a>
            <a href="{{ url_for('admin.manage_categories') }}"><i class="fas fa-tags"></i> Categories</a>
            <a href="{{ url_for('admin.orders') }}"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="{{ url_for('admin.users') }}"><i class="fas fa-users"></i> Customers</a>
            <a href="{{ url_for('admin.delivery_persons') }}"><i class="fas fa-truck"></i> Delivery Persons</a>
            <a href="{{ url_for('admin.send_notification') }}"><i class="fas fa-bell"></i> Notifications</a>
            <a href="{{ url_for('admin.settings') }}"><i class="fas fa-cog"></i> Settings</a>
            <hr style="margin: 20px 0;">
            <a href="{{ url_for('customer.logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="menu-toggle" onclick="toggleSidebar()" style="cursor: pointer;">
                <i class="fas fa-bars fa-lg"></i>
            </div>
            <div class="user-info">
                <i class="fas fa-bell me-3"></i>
                <i class="fas fa-user-circle fa-2x"></i>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="fas fa-edit me-2"></i> Edit Product</h3>
            <a href="{{ url_for('admin.manage_products') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i> Back to Products
            </a>
        </div>

        <div class="form-card">
            <form action="{{ url_for('admin.edit_product', id=product.id) }}" method="POST"
                enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-8">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description"
                                rows="4">{{ product.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price ($)</label>
                                <input type="number" name="price" class="form-control" step="0.01"
                                    value="{{ product.price }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" name="stock" class="form-control" value="{{ product.stock }}"
                                    required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" name="category">
                                    {% for cat in categories %}
                                    <option value="{{ cat.name }}" {% if product.category==cat.name %}selected{% endif
                                        %}>{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Unit</label>
                                <select class="form-select">
                                    <option selected>kg</option>
                                    <option>g</option>
                                    <option>L</option>
                                    <option>ml</option>
                                    <option>piece</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Product Image</label>
                        <div class="image-preview">
                            <img src="{{ url_for('static', filename='images/products/' + product.image) if product.image else 'https://via.placeholder.com/150x150?text=No+Image' }}"
                                alt="Product">
                        </div>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        <small class="text-muted">Leave empty to keep current image</small>
                        <div class="mb-3">
                            <label class="form-label">Or Paste Image URL (Optional)</label>
                            <input type="url" name="image_url" class="form-control"
                                placeholder="https://example.com/image.jpg">
                            <small class="text-muted">If you upload a file above, it will override this URL.</small>
                        </div>

                    </div>

                </div>

                <hr class="my-4">

                <div class="text-end">
                    <button type="button" class="btn btn-danger me-2" onclick="confirmDelete()">
                        <i class="fas fa-trash me-2"></i> Delete Product
                    </button>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-2"></i> Update Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function confirmDelete() {
            if (confirm('Are you sure you want to delete this product?')) {
                window.location.href = "{{ url_for('admin.delete_product', id=product.id) }}";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
