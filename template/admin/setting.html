<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/setting.css') }}">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shopping-basket"></i>
            <h4>Grocery Store Admin</h4>
        </div>
        <div class="sidebar-menu">
            <a href="{{ url_for('admin.dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="{{ url_for('admin.manage_products') }}"><i class="fas fa-box"></i> Products</a>
            <a href="{{ url_for('admin.add_product') }}"><i class="fas fa-plus-circle"></i> Add Product</a>
            <a href="{{ url_for('admin.manage_categories') }}"><i class="fas fa-tags"></i> Categories</a>
            <a href="{{ url_for('admin.orders') }}"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="{{ url_for('admin.users') }}"><i class="fas fa-users"></i> Customers</a>
            <a href="{{ url_for('admin.delivery_persons') }}"><i class="fas fa-truck"></i> Delivery Persons</a>
            <a href="{{ url_for('admin.send_notification') }}"><i class="fas fa-bell"></i> Notifications</a>
            <a href="{{ url_for('admin.settings') }}" class="active"><i class="fas fa-cog"></i> Settings</a>
            <hr style="margin: 20px 0;">
            <a href="{{ url_for('customer.logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-navbar">
            <div class="menu-toggle" onclick="toggleSidebar()" style="cursor: pointer;">
                <i class="fas fa-bars fa-lg"></i>
            </div>
            <div class="user-info">
                <i class="fas fa-bell me-3"></i>
                <i class="fas fa-user-circle fa-2x"></i>
            </div>
        </div>
        
        <h3><i class="fas fa-cog me-2"></i> Admin Settings</h3>
        
        <div class="settings-card">
            <ul class="nav settings-nav" id="settingsTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab">
                        <i class="fas fa-user me-2"></i> Profile
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="security-tab" data-bs-toggle="tab" data-bs-target="#security" type="button" role="tab">
                        <i class="fas fa-lock me-2"></i> Security
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="store-tab" data-bs-toggle="tab" data-bs-target="#store" type="button" role="tab">
                        <i class="fas fa-store me-2"></i> Store Settings
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="notifications-tab" data-bs-toggle="tab" data-bs-target="#notifications" type="button" role="tab">
                        <i class="fas fa-bell me-2"></i> Notifications
                    </button>
                </li>
            </ul>
            
            <div class="tab-content">
                <!-- Profile Settings -->
                <div class="tab-pane fade show active" id="profile" role="tabpanel">
                    <form action="{{ url_for('admin.settings') }}" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" value="{{ current_user.username }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="name" class="form-control" value="Admin User">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Profile Image</label>
                                <input type="file" class="form-control">
                                <small class="text-muted">Recommended size: 200x200 pixels</small>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-success">Save Changes</button>
                            </div>
                        </div>
                    </form>
                </div>
                
                <!-- Security Settings -->
                <div class="tab-pane fade" id="security" role="tabpanel">
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" name="current_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="new_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success">Change Password</button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <h5>Two-Factor Authentication</h5>
                    <p class="text-muted">Add an extra layer of security to your account</p>
                    <button class="btn btn-outline-success">Enable 2FA</button>
                </div>
                
                <!-- Store Settings -->
                <div class="tab-pane fade" id="store" role="tabpanel">
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Store Name</label>
                            <input type="text" class="form-control" value="Grocery Store">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Store Email</label>
                            <input type="email" class="form-control" value="info@grocerystore.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Store Phone</label>
                            <input type="tel" class="form-control" value="+1 234 567 890">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Store Address</label>
                            <textarea class="form-control" rows="3">123 Grocery Street, New York, NY 10001</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Delivery Fee</label>
                            <input type="number" class="form-control" step="0.01" value="5.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Free Delivery Threshold ($)</label>
                            <input type="number" class="form-control" value="50.00">
                        </div>
                        <button type="submit" class="btn btn-success">Save Store Settings</button>
                    </form>
                </div>
                
                <!-- Notification Settings -->
                <div class="tab-pane fade" id="notifications" role="tabpanel">
                    <form action="#" method="POST">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="orderNotif" checked>
                            <label class="form-check-label" for="orderNotif">Receive new order notifications</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="customerNotif" checked>
                            <label class="form-check-label" for="customerNotif">Receive new customer registration alerts</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="stockNotif">
                            <label class="form-check-label" for="stockNotif">Low stock alerts</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="emailNotif" checked>
                            <label class="form-check-label" for="emailNotif">Email notifications</label>
                        </div>
                        <button type="submit" class="btn btn-success">Save Preferences</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
