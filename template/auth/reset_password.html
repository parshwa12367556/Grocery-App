<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Grocery Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth/reset_password.css') }}">
</head>
<body>
       <!-- Modern Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                🛒 GroceryHub
            </a>

            <!-- Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Content -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- Left Menu -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('product_bp.products') }}">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('customer.about') }}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('customer.contact') }}">Contact</a>
                    </li>
                </ul>

                <!-- Search Bar -->
                <form class="d-flex me-3" role="search">
                    <input class="form-control rounded-pill px-3" type="search" placeholder="Search products...">
                    <button class="btn btn-success ms-2 rounded-pill px-3">Search</button>
                </form>

                <!-- Right Side -->
                <ul class="navbar-nav align-items-center">

                    <!-- Cart -->
                    <li class="nav-item me-3">
                        <a class="nav-link position-relative" href="{{ url_for('customer.cart') }}">
                            🛍️
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                0
                            </span>
                        </a>
                    </li>

                    <!-- Login/Register -->
                    <li class="nav-item">
                        <a class="btn btn-outline-light me-2 rounded-pill" href="{{ url_for('customer.login') }}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-success rounded-pill" href="{{ url_for('customer.register') }}">
                            Sign Up
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="reset-container">
        <div class="reset-card">
            <i class="fas fa-lock fa-3x text-success mb-3"></i>
            <h2>Reset Password</h2>
            <p>Enter your new password</p>
            <form action="{{ url_for('customer.login') }}" method="POST">
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="New Password" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn-reset">Reset Password</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
